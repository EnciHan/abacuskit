<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">abacuskit logo</title>
  <desc id="desc">Terminal-style abacuskit ASCII logo with author Han Enci and Xi'an University of Technology affiliation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="52%" stop-color="#122033"/>
      <stop offset="100%" stop-color="#16313d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66e3ff"/>
      <stop offset="50%" stop-color="#8ddf7a"/>
      <stop offset="100%" stop-color="#f2c14e"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="32" fill="url(#bg)"/>
  <rect x="28" y="28" width="1144" height="464" rx="24" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>
  <rect x="58" y="58" width="1084" height="404" rx="18" fill="#07111f" fill-opacity="0.58" filter="url(#softShadow)"/>

  <g transform="translate(91 88)">
    <circle cx="0" cy="0" r="8" fill="#ff5f56"/>
    <circle cx="28" cy="0" r="8" fill="#ffbd2e"/>
    <circle cx="56" cy="0" r="8" fill="#27c93f"/>
  </g>

  <text x="90" y="155"
        fill="#eaf6ff"
        font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace"
        font-size="31"
        font-weight="700"
        letter-spacing="0">
    <tspan x="90" dy="0">  ___   ____    ___    ____  _   _  ____  _  __  ___  _____ </tspan>
    <tspan x="90" dy="42"> / _ \ | __ )  / _ \  / ___|| | | |/ ___|| |/ / |_ _||_   _|</tspan>
    <tspan x="90" dy="42">| /_\ ||  _ \ | /_\ || |    | | | |\___ \| ' /   | |   | |  </tspan>
    <tspan x="90" dy="42">|  _  || |_) ||  _  || |___ | |_| | ___) | . \   | |   | |  </tspan>
    <tspan x="90" dy="42">|_| |_||____/ |_| |_| \____| \___/ |____/|_|\_\ |___|  |_|  </tspan>
  </text>

  <rect x="90" y="382" width="1020" height="3" rx="1.5" fill="url(#accent)"/>
  <text x="90" y="425"
        fill="#f7fbff"
        font-family="Inter, Arial, sans-serif"
        font-size="28"
        font-weight="700"
        letter-spacing="0">
    Author: Han Enci
  </text>
  <text x="90" y="461"
        fill="#bcd2e6"
        font-family="Inter, Arial, sans-serif"
        font-size="24"
        font-weight="500"
        letter-spacing="0">
    Affiliation: Xi'an University of Technology
  </text>
</svg>
